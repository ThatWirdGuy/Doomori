<!DOCTYPE html>
<html lang="en-us">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
    }
  </style>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Doomori</title>
  </head>
  <body style="text-align: center">
    <canvas id="unity-canvas" style="width: 100vw; height: 100vh; background: #000000"></canvas>
    <script src="Build/WEBGL Doomori Build.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/WEBGL Doomori Build.data",
        frameworkUrl: "Build/WEBGL Doomori Build.framework.js",
        codeUrl: "Build/WEBGL Doomori Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Fostergames",
        productName: "Doomori",
        productVersion: "1",
      });
    </script>
  </body>
</html>
