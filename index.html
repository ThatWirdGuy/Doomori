<!DOCTYPE html>
<html lang="en-us">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
    }
  </style>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Doomori</title>
  </head>
  <body style="text-align: center">
    <canvas id="unity-canvas" style="width: 100vw; height: 100vh; background: #000000"></canvas>
    <script src="Build/WEBGL Doomori Build.loader.js"></script>
    <script>

      const response_P1 = await fetch("Build/part_0.data");
      const buffer_P1 = await response_P1.arrayBuffer();

      const response_P2 = await fetch("Build/part_1.data");
      const buffer_P2 = await response_P2.arrayBuffer();
      
      const Part_0 = new Uint8Array(buffer_P1);
      const Part_1 = new Uint8Array(buffer_P2);
      const merged = new Uint8Array(Part_0.length + Part_1.length)

      merged.set(Part_0, 0);
      merged.set(Part_1, Part_0.length);

      const blob = new Blob([merged]);
      const dataUrl = URL.createObjectURL(blob);

      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: dataUrl,
        frameworkUrl: "Build/WEBGL Doomori Build.framework.js",
        codeUrl: "Build/WEBGL Doomori Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Fostergames",
        productName: "Doomori",
        productVersion: "1",
      });
    </script>
  </body>
</html>
</html>
